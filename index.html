<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Diamond-BETT</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/agent.css">
<link rel="stylesheet" href="css/deposit.css">

</head>
<body>

<div class="main" id="mainContent">
  <!-- HOME PAGE -->
  <div id="homePage" class="page-panel active">
    <!-- Top Area moved INSIDE homePage to scroll with content -->
    <div id="topArea">
      <div class="banner-wrap" id="bannerWrap">
        <div class="banner-track" id="bannerTrack">
          <div class="banner-slide" style="background:linear-gradient(135deg,#1a0850,#5a0095);">
            <div class="banner-placeholder">
              <div style="font-size:11px;color:rgba(255,255,255,.6);">PRAGMATIC PLAY</div>
              <div class="b-title" style="color:#f5c518;">Gates of OLYMPUS</div>
              <div class="b-sub">ZEUS ရဲ့ အင်အား</div>
              <div class="b-amount">10,000</div>
            </div>
          </div>
          <div class="banner-slide" style="background:linear-gradient(135deg,#041840,#0060b0);">
            <div class="banner-placeholder">
              <div style="font-size:11px;color:rgba(255,255,255,.6);">LIVE CASINO</div>
              <div class="b-title" style="color:#40cfff;">Real Dealers</div>
              <div class="b-sub">တိုက်ရိုက် ကာစိနို</div>
              <div class="b-amount" style="color:#40cfff;">50,000</div>
            </div>
          </div>
          <div class="banner-slide" style="background:linear-gradient(135deg,#300808,#900018);">
            <div class="banner-placeholder">
              <div style="font-size:11px;color:rgba(255,255,255,.6);">TOURNAMENT</div>
              <div class="b-title" style="color:#ff5060;">Grand Prize</div>
              <div class="b-sub">နှစ်တိုင်း ဆုငွေကြီး</div>
              <div class="b-amount" style="color:#ff7080;">100,000</div>
            </div>
          </div>
        </div>
        <div class="banner-dots" id="bannerDots">
          <div class="dot active" data-i="0"></div>
          <div class="dot" data-i="1"></div>
          <div class="dot" data-i="2"></div>
        </div>
      </div>

      <!-- ===== QUICK NAV ===== -->
      <div class="quick-nav">
        <div class="qnav-top">
          <div class="pay-logos" id="payLogos" style="display:none;">
            <div class="pay-logo-item kbz-anim" title="KBZ Pay">
              <svg width="34" height="34" viewBox="0 0 52 52">
                <defs>
                  <linearGradient id="kbzF" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/>
                  </linearGradient>
                  <linearGradient id="kbzSh" x1="0%" y1="0%" x2="60%" y2="100%">
                    <stop offset="0%" stop-color="white" stop-opacity=".4"/><stop offset="100%" stop-color="white" stop-opacity="0"/>
                  </linearGradient>
                  <filter id="kbzD"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#1e3a8a" flood-opacity=".5"/></filter>
                </defs>
                <path d="M44 8 L48 12 L48 46 L44 42 Z" fill="#1e40af" opacity=".8"/>
                <path d="M6 42 L10 46 L48 46 L44 42 Z" fill="#1e3a8a" opacity=".7"/>
                <rect x="6" y="6" width="38" height="38" rx="10" fill="url(#kbzF)" filter="url(#kbzD)"/>
                <rect x="6" y="6" width="38" height="38" rx="10" fill="url(#kbzSh)"/>
                <text x="25" y="23" text-anchor="middle" fill="white" font-size="11" font-weight="900" letter-spacing=".8" font-family="'Segoe UI',Arial,sans-serif">KBZ</text>
                <text x="25" y="34" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="700" font-family="'Segoe UI',Arial,sans-serif">Pay</text>
                <rect x="14" y="37" width="22" height="2" rx="1" fill="#fcd34d" opacity=".8"/>
              </svg>
              <span class="pay-logo-label">KBZ Pay</span>
            </div>
            <div class="pay-logo-item wave-anim" title="Wave Money">
              <svg width="34" height="34" viewBox="0 0 52 52">
                <defs>
                  <linearGradient id="waveF" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/>
                  </linearGradient>
                  <linearGradient id="waveSh" x1="0%" y1="0%" x2="60%" y2="100%">
                    <stop offset="0%" stop-color="white" stop-opacity=".35"/><stop offset="100%" stop-color="white" stop-opacity="0"/>
                  </linearGradient>
                  <filter id="waveD"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#92400e" flood-opacity=".5"/></filter>
                </defs>
                <path d="M44 8 L48 12 L48 46 L44 42 Z" fill="#b45309" opacity=".8"/>
                <path d="M6 42 L10 46 L48 46 L44 42 Z" fill="#92400e" opacity=".7"/>
                <rect x="6" y="6" width="38" height="38" rx="10" fill="url(#waveF)" filter="url(#waveD)"/>
                <circle cx="25" cy="22" r="11" fill="none" stroke="#0ea5e9" stroke-width="3"/>
                <path d="M14 22 Q18.5 15 23 22 Q27.5 29 32 22 Q34 18 36 22" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
                <rect x="6" y="6" width="38" height="38" rx="10" fill="url(#waveSh)"/>
                <text x="25" y="41" text-anchor="middle" fill="#1e3a8a" font-size="6.5" font-weight="900" font-family="'Segoe UI',Arial,sans-serif">Wave Money</text>
              </svg>
              <span class="pay-logo-label">Wave</span>
            </div>
          </div>

          <div class="nav-icons">
            <a class="nav-icon-btn nav-download-btn" href="https://www.dropbox.com/scl/fi/b4a53jky2kotpd6rpej6m/DiamondBETT.apk?rlkey=4qxktbanrgfoxz7cx1vtdo702&st=c7l3tvmk&dl=1" target="_blank" rel="noopener">
              <div class="nav-ico">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M3 20h18"/></svg>
              </div>
              <span>ဒေါင်း</span>
            </a>
            <a class="nav-icon-btn nav-bot-btn" href="https://ccorryxx-bot.github.io/updated_premiumv2BOT/" target="_blank" rel="noopener">
              <div class="nav-ico nav-ico-bot">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="8" width="18" height="13" rx="3"/><path d="M12 5V8" stroke-linecap="round"/><circle cx="12" cy="4" r="1.5" fill="currentColor" stroke="none"/><circle cx="8.5" cy="13.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="13.5" r="1.5" fill="currentColor" stroke="none"/><path d="M9 17.5h6" stroke-linecap="round"/></svg>
              </div>
              <span>Bot</span>
            </a>
            <button class="nav-icon-btn" id="langBtn">
              <div class="nav-ico">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10"/></svg>
              </div>
              <span class="lang-label" id="langLabel">မြန်မာ</span>
            </button>
          </div>
        </div>

        <div class="qnav-actions">
          <button class="login-btn" id="showAuthBtn">လော့ဂ်အင်!</button>
          <div class="wallet-btns" id="walletBtns" style="display:none;">
            <button class="wallet-btn deposit">ငွေသွင်း</button>
            <button class="wallet-btn withdraw">ငွေထုတ်</button>
          </div>
          <div class="qnav-balance" id="qnavBalanceWrap" style="display:none;">
            <canvas id="nftAvatar" class="nft-avatar-canvas" width="30" height="30"></canvas>
            <div class="qnav-user-info">
              <span class="qnav-username" id="balUsername">—</span>
              <div class="qnav-amount-row">
                <span class="qnav-bal-num" id="qnavBalance">0.00</span>
                <span class="qnav-bal-unit">ks.</span>
              </div>
            </div>
            <button class="qnav-refresh" id="balRefreshBtn" title="Refresh Balance">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="announce">
        <div class="announce-ticker">
          <span>ကြိုဆိုပါတယ်! Diamond-BETT မှာ မှတ်ပုံတင်ပြီး ဆုငွေများ ရယူပါ။</span>
        </div>
      </div>
    </div>
    <!-- Content injected here -->
    <div id="homeContent"></div>
  </div>

  <div id="tasksPage"   class="page-panel"></div>
  <div id="agentPage"   class="page-panel"></div>
  <div id="csPage"      class="page-panel"></div>
  <div id="accountPage" class="page-panel"></div>
  <div id="adminPage"   class="page-panel"></div>
</div>

<nav class="bottom-nav">
  <button class="bnav-btn active" data-nav="home">
    <span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/><path d="M21 22H3"/></svg></span>
    <span>Home</span>
  </button>
  <button class="bnav-btn" data-nav="tasks">
    <span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span>
    <span>Tasks</span>
  </button>
  <button class="bnav-btn agent-orb-btn" data-nav="agent">
    <span class="bnav-icon agent-icon-wrap">
      <canvas id="agentOrb" width="32" height="32"></canvas>
    </span>
    <span class="agent-orb-label">Agent</span>
  </button>
  <button class="bnav-btn" data-nav="cs">
    <span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
    <span>CS</span>
  </button>
  <button class="bnav-btn" data-nav="account">
    <span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>Account</span>
  </button>
</nav>

<div id="modalsContainer"></div>
<div id="gToast"></div>

<script src="js/config.js"   defer></script>
<script src="js/utils.js"    defer></script>
<script src="js/ui.js"       defer></script>
<script src="js/auth.js"     defer></script>
<script src="js/deposit.js"  defer></script>
<script src="js/withdraw.js" defer></script>
<script src="js/games.js"    defer></script>
<script src="js/wheel.js"    defer></script>
<script src="js/agent.js"    defer></script>
<script src="js/main.js"     defer></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[SW] Registered, scope:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>
</body>
</html>
