<div class="admin-pg">

  <!-- Header -->
  <div class="admin-hdr">
    <button class="admin-back" onclick="showPage('account')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="admin-hdr-title">Admin Dashboard</span>
    <div class="admin-rt-dot" id="adminRtDot" title="Real-Time"></div>
  </div>

  <!-- Admin Tab Bar -->
  <div style="display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px;overflow-x:auto;">
    <button class="admin-nav-tab active" id="adminTab_tx"     onclick="switchAdminTab('tx')">ငွေကြေး မှတ်တမ်း</button>
    <button class="admin-nav-tab"        id="adminTab_content" onclick="switchAdminTab('content')">Content Control</button>
  </div>

  <!-- ── Pane: Transaction History ── -->
  <div class="admin-tab-pane" id="adminPane_tx" style="display:block">
    <div class="admin-filter-row">
      <select id="aFilterType" onchange="loadAdminTx()">
        <option value="">Type အားလုံး</option>
        <option value="deposit">⬇ ငွေသွင်း</option>
        <option value="withdrawal">⬆ ငွေထုတ်</option>
      </select>
      <select id="aFilterStatus" onchange="loadAdminTx()">
        <option value="">Status အားလုံး</option>
        <option value="pending">⏳ Pending</option>
        <option value="approved">✓ Approved</option>
        <option value="rejected">✕ Rejected</option>
      </select>
    </div>
    <div class="admin-list" id="adminTxList"><div class="admin-spinner"></div></div>
  </div>

  <!-- ── Pane: Content Control ── -->
  <div class="admin-tab-pane" id="adminPane_content" style="display:none">

    <!-- Agent Dashboard Icon Images -->
    <div class="admin-content-card">
      <div class="admin-content-card-hdr">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f5c518" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        Agent Dashboard Icon Images
      </div>
      <div class="admin-content-card-sub">ImageKit.io URL ထည့်ပြီး icon image ကို update လုပ်ပါ</div>

      <div id="agentIconsList">
        <div class="admin-spinner"></div>
      </div>

      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="admin-save-btn" onclick="saveAgentIcons()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          သိမ်းဆည်း
        </button>
        <div class="admin-save-status" id="iconSaveStatus"></div>
      </div>
    </div>

  </div>

</div>

<style>
.admin-nav-tab{flex-shrink:0;background:none;border:none;color:rgba(255,255,255,.4);font-size:11px;font-family:inherit;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.admin-nav-tab.active{color:#f5c518;border-bottom-color:#f5c518;}
.admin-content-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin:10px;}
.admin-content-card-hdr{font-size:12px;font-weight:700;color:#f5c518;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.admin-content-card-sub{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:12px;}
.admin-icon-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.admin-icon-row:last-child{border-bottom:none;}
.admin-icon-preview{width:36px;height:36px;border-radius:8px;object-fit:cover;background:rgba(255,255,255,.06);flex-shrink:0;border:1px solid rgba(255,255,255,.12);}
.admin-icon-lbl{font-size:10px;color:rgba(255,255,255,.5);width:60px;flex-shrink:0;}
.admin-icon-input{flex:1;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:#fff;font-size:10px;padding:7px 10px;font-family:inherit;}
.admin-icon-input:focus{outline:none;border-color:rgba(245,197,24,.4);}
.admin-save-btn{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#f5c518,#d4a000);color:#000;border:none;border-radius:8px;font-size:11px;font-weight:700;font-family:inherit;padding:9px 16px;cursor:pointer;}
.admin-save-status{font-size:10px;color:rgba(100,220,100,.8);align-self:center;}
</style>

<script>
// ── Tab Switch ──────────────────────────────────────────────
function switchAdminTab(tab) {
  document.querySelectorAll('.admin-nav-tab').forEach(function(t) {
    t.classList.toggle('active', t.id === 'adminTab_' + tab);
  });
  document.querySelectorAll('.admin-tab-pane').forEach(function(p) {
    p.style.display = p.id === 'adminPane_' + tab ? 'block' : 'none';
  });
  if (tab === 'content') loadAgentIconsAdmin();
}

// ── My Transaction History ──────────────────────────────────
var _adminRtCh = null;

function initAdminDashboard() {
  if (!window.currentUserId) {
    if (typeof showPage    === 'function') showPage('account');
    if (typeof openAuthModal === 'function') openAuthModal('login');
    return;
  }
  loadAdminTx();
  subscribeAdminRt();
}

// ── My Transactions ─────────────────────────────────────────
async function loadAdminTx() {
  var list = document.getElementById('adminTxList');
  if (!list || !window.DB || !window.currentUserId) return;
  list.innerHTML = '<div class="admin-spinner"></div>';

  var typeF   = document.getElementById('aFilterType')?.value   || '';
  var statusF = document.getElementById('aFilterStatus')?.value || '';

  var q = window.DB
    .from('transactions')
    .select('*')
    .eq('user_id', window.currentUserId)
    .order('created_at', { ascending: false })
    .limit(60);

  if (typeF)   q = q.eq('type',   typeF);
  if (statusF) q = q.eq('status', statusF);

  var result = await q;
  var data = result.data, error = result.error;
  if (error || !data || !data.length) {
    list.innerHTML = '<div class="admin-empty">မှတ်တမ်း မရှိသေးပါ</div>';
    return;
  }
  list.innerHTML = data.map(function(t){ return renderAdminTxRow(t); }).join('');
}

function renderAdminTxRow(t) {
  var p2  = function(n){ return String(n).padStart(2,'0'); };
  var dt  = new Date(t.created_at);
  var dts = dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate())+' '+p2(dt.getHours())+':'+p2(dt.getMinutes());
  var amt = parseFloat(t.amount || 0).toLocaleString('en-US',{minimumFractionDigits:2});
  var stM = {
    pending : {l:'⏳ Pending',  c:'as-pend'},
    approved: {l:'✓ Approved',  c:'as-ok'  },
    rejected: {l:'✕ Rejected',  c:'as-rej' }
  };
  var st  = stM[t.status] || {l:t.status,c:''};
  var cls = t.type === 'deposit' ? 'atx-dep' : 'atx-wd';
  var lbl = t.type === 'deposit' ? '⬇ ငွေသွင်း' : '⬆ ငွေထုတ်';
  var sig = t.type === 'deposit' ? '+' : '-';
  return '<div class="admin-tx-row '+cls+'" id="atr_'+t.id+'">'+
    '<div class="atx-top"><span class="atx-type">'+lbl+'</span><span class="atx-amt">'+sig+' '+amt+' ks</span></div>'+
    '<div class="atx-mid"><span class="atx-det">'+(t.payment_method||'—')+(t.payment_details?' · '+t.payment_details:'')+'</span><span class="atx-date">'+dts+'</span></div>'+
    '<div class="atx-bot"><span class="admin-badge '+st.c+'">'+st.l+'</span></div>'+
  '</div>';
}

// ── Realtime ────────────────────────────────────────────────
function subscribeAdminRt() {
  if (!window.DB || !window.currentUserId) return;
  if (_adminRtCh) { window.DB.removeChannel(_adminRtCh); _adminRtCh = null; }
  _adminRtCh = window.DB
    .channel('mytx-rt-' + window.currentUserId)
    .on('postgres_changes',
      {event:'*',schema:'public',table:'transactions',filter:'user_id=eq.'+window.currentUserId},
      function(){ loadAdminTx(); })
    .subscribe(function(){
      var dot = document.getElementById('adminRtDot');
      if (dot) dot.classList.add('active');
    });
}

// ── Content Control: Agent Icons ────────────────────────────
var ICON_KEYS = [
  { key:'share',    label:'မျှဝေ'   },
  { key:'telegram', label:'Telegram'},
  { key:'viber',    label:'Viber'   },
  { key:'facebook', label:'Facebook'},
  { key:'whatsapp', label:'WhatsApp'},
];

var _iconData = {};

async function loadAgentIconsAdmin() {
  var list = document.getElementById('agentIconsList');
  if (!list || !window.DB) return;
  list.innerHTML = '<div class="admin-spinner"></div>';

  var result = await window.DB.from('agent_icons').select('key,image_url,link_url');
  var data = result.data || [];
  data.forEach(function(row){ _iconData[row.key] = row; });

  list.innerHTML = ICON_KEYS.map(function(ic) {
    var row  = _iconData[ic.key] || {};
    var iUrl = row.image_url || '';
    var lUrl = row.link_url  || '';
    var prevStyle = iUrl
      ? 'background:url('+iUrl+') center/cover;border:1px solid rgba(245,197,24,.3);'
      : 'background:rgba(255,255,255,.06);';
    return '<div class="admin-icon-row">'+
      '<div class="admin-icon-preview" id="aprev_'+ic.key+'" style="'+prevStyle+'"></div>'+
      '<div class="admin-icon-lbl">'+ic.label+'</div>'+
      '<input class="admin-icon-input" id="aiUrl_'+ic.key+'" placeholder="ImageKit URL (Image)" value="'+iUrl+'" oninput="previewIcon(''+ic.key+'')">'+
    '</div>';
  }).join('');
}

function previewIcon(key) {
  var url  = document.getElementById('aiUrl_' + key)?.value || '';
  var prev = document.getElementById('aprev_' + key);
  if (!prev) return;
  if (url) {
    prev.style.background = 'url('+url+') center/cover';
    prev.style.border     = '1px solid rgba(245,197,24,.3)';
  } else {
    prev.style.background = 'rgba(255,255,255,.06)';
    prev.style.border     = '1px solid rgba(255,255,255,.12)';
  }
}

async function saveAgentIcons() {
  if (!window.DB) return;
  var statusEl = document.getElementById('iconSaveStatus');
  if (statusEl) statusEl.textContent = 'သိမ်းနေသည်...';

  var rows = ICON_KEYS.map(function(ic){
    return {
      key       : ic.key,
      image_url : (document.getElementById('aiUrl_'+ic.key)?.value || '').trim(),
      link_url  : '',
    };
  });

  var result = await window.DB.from('agent_icons').upsert(rows, { onConflict: 'key' });
  if (result.error) {
    if (statusEl) statusEl.textContent = '❌ ' + result.error.message;
    return;
  }

  if (statusEl) {
    statusEl.textContent = '✅ သိမ်းပြီးပြီ!';
    setTimeout(function(){ statusEl.textContent = ''; }, 3000);
  }

  // Refresh live icons on agent page
  if (typeof loadAgentIcons === 'function') loadAgentIcons();
}
</script>
