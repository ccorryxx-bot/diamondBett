<style>
/* ── CS PAGE ─────────────────────────────────────────── */
.cs-wrap { padding-bottom: 80px; min-height: 100vh; background: #07060f; }

/* Main tabs */
.cs-main-tabs {
  display: flex; overflow-x: auto; gap: 0;
  background: #0e0c1e; border-bottom: 1px solid rgba(255,255,255,.07);
  scrollbar-width: none; position: sticky; top: 0; z-index: 10;
}
.cs-main-tabs::-webkit-scrollbar { display: none; }
.cs-mtab {
  flex-shrink: 0; padding: 13px 16px; font-size: 13px; font-weight: 600;
  color: #666; background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap; transition: all .2s; position: relative;
}
.cs-mtab.active { color: #f5c518; border-bottom-color: #f5c518; }
.cs-mtab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: #ef4444; color: #fff; font-size: 9px; font-weight: 800;
  border-radius: 10px; min-width: 16px; height: 16px; padding: 0 4px;
  margin-left: 4px; vertical-align: middle;
}
.cs-mtab-badge.hidden { display: none; }

/* Tab contents */
.cs-tab-pane { display: none; padding: 14px; }
.cs-tab-pane.active { display: block; }

/* 24/7 Card */
.cs-247-card {
  background: linear-gradient(135deg, #1a1535 0%, #0f0d20 100%);
  border: 1px solid rgba(245,197,24,.2); border-radius: 16px;
  padding: 18px; margin-bottom: 16px;
}
.cs-247-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 6px; }
.cs-247-desc { font-size: 11.5px; color: #888; line-height: 1.6; margin-bottom: 14px; }
.cs-247-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #f5c518, #e6a800);
  color: #0a0a15; font-size: 13px; font-weight: 800;
  padding: 10px 18px; border-radius: 50px; border: none;
  cursor: pointer; text-decoration: none; box-shadow: 0 4px 16px rgba(245,197,24,.35);
}
.cs-247-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,.2); display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}

/* Sub tabs */
.cs-sub-tabs {
  display: flex; gap: 6px; margin-bottom: 14px;
}
.cs-stab {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 16px; border-radius: 10px; font-size: 12.5px; font-weight: 600;
  border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04);
  color: #777; cursor: pointer; transition: all .2s; white-space: nowrap;
}
.cs-stab.active {
  background: rgba(245,197,24,.12); border-color: rgba(245,197,24,.35); color: #f5c518;
}

/* Contact cards */
.cs-contact-card {
  display: flex; align-items: center; gap: 13px;
  background: #0e0c1e; border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px; padding: 14px; margin-bottom: 10px;
}
.cs-cc-logo { flex-shrink: 0; }
.cs-cc-info { flex: 1; min-width: 0; }
.cs-cc-name { font-size: 13px; font-weight: 700; color: #ddd; margin-bottom: 4px; }
.cs-cc-name span { color: #fff; }
.cs-cc-link-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 3px;
}
.cs-cc-link { font-size: 10.5px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
.cs-cc-copy {
  background: none; border: none; cursor: pointer; color: #f5c518; padding: 2px; flex-shrink: 0;
}
.cs-cc-hours { font-size: 10px; color: #555; }
.cs-go-btn {
  flex-shrink: 0; padding: 10px 16px; background: linear-gradient(135deg,#f5c518,#e6a800);
  color: #0a0a15; font-size: 12px; font-weight: 800; border: none;
  border-radius: 10px; cursor: pointer; text-decoration: none; white-space: nowrap;
  box-shadow: 0 3px 12px rgba(245,197,24,.3);
}

/* Announce / Noti list */
.cs-list-item {
  background: #0e0c1e; border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px; padding: 14px; margin-bottom: 10px;
}
.cs-list-badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
  border-radius: 20px; font-size: 10px; font-weight: 700; margin-bottom: 8px;
}
.cs-list-badge.ann { background: rgba(99,102,241,.15); color: #818cf8; }
.cs-list-badge.noti { background: rgba(34,197,94,.12); color: #22c55e; }
.cs-list-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.cs-list-body { font-size: 11.5px; color: #888; line-height: 1.6; }
.cs-list-date { font-size: 10px; color: #444; margin-top: 7px; }
.cs-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 50px 20px; text-align: center;
}
.cs-empty-icon { margin-bottom: 14px; opacity: .25; }
.cs-empty-txt { font-size: 13px; color: #555; }

/* Marquee tab */
.cs-marquee-wrap { padding: 10px 0; }
.cs-marquee-item {
  background: linear-gradient(90deg, rgba(245,197,24,.06), rgba(245,197,24,.02));
  border-left: 3px solid #f5c518; border-radius: 8px;
  padding: 12px 14px; margin-bottom: 8px;
}
.cs-marquee-txt { font-size: 12px; color: #ccc; line-height: 1.6; }
.cs-spinner {
  display: flex; align-items: center; justify-content: center; padding: 40px;
}
.cs-spin {
  width: 28px; height: 28px; border: 2px solid rgba(245,197,24,.2);
  border-top-color: #f5c518; border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<div class="cs-wrap">
  <!-- ── Main Tabs ───────────────────────────── -->
  <div class="cs-main-tabs" id="csMtabs">
    <button class="cs-mtab active" onclick="csSwitchMain(this,'service')">ဝန်ဆောင်မှု</button>
    <button class="cs-mtab" onclick="csSwitchMain(this,'announce')">
      ကြေငြာချက်
      <span class="cs-mtab-badge hidden" id="csBadgeAnn">0</span>
    </button>
    <button class="cs-mtab" onclick="csSwitchMain(this,'noti')">
      အသိပေးချက်
      <span class="cs-mtab-badge hidden" id="csBadgeNoti">0</span>
    </button>
    <button class="cs-mtab" onclick="csSwitchMain(this,'marquee')">Marquee</button>
  </div>

  <!-- ── Service Tab ─────────────────────────── -->
  <div class="cs-tab-pane active" id="csTab-service">
    <!-- 24/7 Card -->
    <div class="cs-247-card">
      <div class="cs-247-title">24/7 အွန်လိုင်းအကူအညီ</div>
      <div class="cs-247-desc">သင့်ပြဿနာများကို ဖြေရှင်းရန် ပစ်မှတ်ကျင်နယ်မှ ဝန်ဆောင်မှုပေးသည့် ဆက်သွယ်မှုပေးသွားပါမည်။</div>
      <a href="" target="_blank" rel="noopener" id="cs247Btn" class="cs-247-btn">
        <div class="cs-247-avatar">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="11" cy="11" r="11" fill="rgba(255,255,255,.15)"/>
            <path d="M11 5a6 6 0 1 1 0 12A6 6 0 0 1 11 5zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 1.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5z" fill="#f5c518"/>
          </svg>
        </div>
        24/7 ဝန်ဆောင်မှု
      </a>
    </div>

    <!-- Sub Tabs -->
    <div class="cs-sub-tabs">
      <button class="cs-stab active" onclick="csSwitchSub(this,'viber')" id="csStab-viber">
        <img src="https://ik.imagekit.io/tdpebgueq/icons/viber_logo_wG8S5sFl5P.png?tr=w-36,h-36,f-auto&v=2" width="18" height="18" style="border-radius:50%;flex-shrink:0;display:block" loading="lazy">
        VIBER_SERVICE
      </button>
      <button class="cs-stab" onclick="csSwitchSub(this,'telegram')" id="csStab-telegram">
        <img src="https://ik.imagekit.io/tdpebgueq/icons/telegram_logo_QeWRW9-okP.png?tr=w-36,h-36,f-auto&v=2" width="18" height="18" style="flex-shrink:0;display:block" loading="lazy">
        Telegram ဝန်ဆောင်မှု
      </button>
    </div>

    <!-- Viber Contacts — loaded dynamically from DB -->
    <div id="csCont-viber">
      <div class="cs-spinner"><div class="cs-spin"></div></div>
    </div>

    <!-- Telegram Contacts — loaded dynamically from DB -->
    <div id="csCont-telegram" style="display:none;">
      <div class="cs-spinner"><div class="cs-spin"></div></div>
    </div>
  </div>

  <!-- ── Announce Tab ────────────────────────── -->
  <div class="cs-tab-pane" id="csTab-announce">
    <div class="cs-spinner" id="csAnnSpinner"><div class="cs-spin"></div></div>
    <div id="csAnnList"></div>
    <div class="cs-empty" id="csAnnEmpty" style="display:none;">
      <div class="cs-empty-icon">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </div>
      <div class="cs-empty-txt">ကြေငြာချက် မရှိသေးပါ</div>
    </div>
  </div>

  <!-- ── Noti Tab ───────────────────────────── -->
  <div class="cs-tab-pane" id="csTab-noti">
    <div class="cs-spinner" id="csNotiSpinner"><div class="cs-spin"></div></div>
    <div id="csNotiList"></div>
    <div class="cs-empty" id="csNotiEmpty" style="display:none;">
      <div class="cs-empty-icon">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </div>
      <div class="cs-empty-txt">အသိပေးချက် မရှိသေးပါ</div>
    </div>
  </div>

  <!-- ── Marquee Tab ────────────────────────── -->
  <div class="cs-tab-pane" id="csTab-marquee">
    <div class="cs-marquee-wrap" id="csMarqueeList">
      <div class="cs-spinner"><div class="cs-spin"></div></div>
    </div>
  </div>
</div>

<script>
// ── CS Tab switch ─────────────────────────────────────────
function csSwitchMain(btn, tab) {
  document.querySelectorAll('.cs-mtab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.cs-tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const pane = document.getElementById('csTab-' + tab);
  if (pane) pane.classList.add('active');

  if (tab === 'announce') csLoadAnnouncements();
  if (tab === 'noti')     csLoadNotifications();
  if (tab === 'marquee')  csLoadMarquee();
}

function csSwitchSub(btn, sub) {
  document.querySelectorAll('.cs-stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('csCont-viber').style.display    = sub === 'viber'    ? 'block' : 'none';
  document.getElementById('csCont-telegram').style.display = sub === 'telegram' ? 'block' : 'none';
}

// ── Copy ──────────────────────────────────────────────────
function csCopy(id) {
  const txt = document.getElementById(id)?.textContent || '';
  navigator.clipboard?.writeText(txt)
    .then(() => { if (typeof gToast === 'function') gToast('ကူးပြီးပါပြီ', 'success'); })
    .catch(() => {});
}

// ── Load Announcements ─────────────────────────────────────
async function csLoadAnnouncements() {
  const spinner = document.getElementById('csAnnSpinner');
  const list    = document.getElementById('csAnnList');
  const empty   = document.getElementById('csAnnEmpty');
  if (!window.DB) return;
  if (spinner) spinner.style.display = 'flex';
  if (list) list.innerHTML = '';

  try {
    const { data, error } = await window.DB
      .from('notifications')
      .select('*')
      .eq('type', 'announcement')
      .order('created_at', { ascending: false })
      .limit(30);

    if (spinner) spinner.style.display = 'none';

    if (error || !data?.length) {
      if (empty) empty.style.display = 'flex';
      // Update badge
      const badge = document.getElementById('csBadgeAnn');
      if (badge) { badge.textContent = '0'; badge.classList.add('hidden'); }
      return;
    }

    const badge = document.getElementById('csBadgeAnn');
    if (badge) { badge.textContent = data.length; badge.classList.remove('hidden'); }
    if (empty) empty.style.display = 'none';

    const p2 = n => String(n).padStart(2,'0');
    list.innerHTML = data.map(n => {
      const dt = new Date(n.created_at);
      const dts = `${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())} ${p2(dt.getHours())}:${p2(dt.getMinutes())}`;
      return `<div class="cs-list-item">
        <div class="cs-list-badge ann">📢 ကြေငြာချက်</div>
        <div class="cs-list-title">${n.title || 'ကြေငြာချက်'}</div>
        <div class="cs-list-body">${n.message || ''}</div>
        <div class="cs-list-date">${dts}</div>
      </div>`;
    }).join('');
  } catch(e) {
    if (spinner) spinner.style.display = 'none';
    if (empty) empty.style.display = 'flex';
    console.error('csLoadAnnouncements:', e);
  }
}

// ── Load Notifications ─────────────────────────────────────
async function csLoadNotifications() {
  const spinner = document.getElementById('csNotiSpinner');
  const list    = document.getElementById('csNotiList');
  const empty   = document.getElementById('csNotiEmpty');
  if (!window.DB) return;
  if (spinner) spinner.style.display = 'flex';
  if (list) list.innerHTML = '';

  const uid = window.currentUserId;
  if (!uid) {
    if (spinner) spinner.style.display = 'none';
    if (empty) empty.style.display = 'flex';
    return;
  }

  try {
    const { data, error } = await window.DB
      .from('notifications')
      .select('*')
      .eq('user_id', uid)
      .order('created_at', { ascending: false })
      .limit(50);

    if (spinner) spinner.style.display = 'none';

    if (error || !data?.length) {
      if (empty) empty.style.display = 'flex';
      const badge = document.getElementById('csBadgeNoti');
      if (badge) { badge.textContent = '0'; badge.classList.add('hidden'); }
      return;
    }

    const badge = document.getElementById('csBadgeNoti');
    if (badge) { badge.textContent = data.length; badge.classList.remove('hidden'); }
    if (empty) empty.style.display = 'none';

    const typeIcon = { success: '✅', error: '❌', warning: '⚠️', normal: '🔔' };
    const p2 = n => String(n).padStart(2,'0');
    list.innerHTML = data.map(n => {
      const dt = new Date(n.created_at);
      const dts = `${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())} ${p2(dt.getHours())}:${p2(dt.getMinutes())}`;
      return `<div class="cs-list-item">
        <div class="cs-list-badge noti">${typeIcon[n.type]||'🔔'} အသိပေးချက်</div>
        <div class="cs-list-body">${n.message || ''}</div>
        <div class="cs-list-date">${dts}</div>
      </div>`;
    }).join('');
  } catch(e) {
    if (spinner) spinner.style.display = 'none';
    if (empty) empty.style.display = 'flex';
    console.error('csLoadNotifications:', e);
  }
}

// ── Load Marquee ───────────────────────────────────────────
async function csLoadMarquee() {
  const wrap = document.getElementById('csMarqueeList');
  if (!wrap || !window.DB) return;

  try {
    const { data } = await window.DB
      .from('notifications')
      .select('message,created_at')
      .eq('type', 'announcement')
      .order('created_at', { ascending: false })
      .limit(10);

    const items = data?.length ? data : [
      { message: 'Diamond-BETT မှ ကြိုဆိုပါသည်! မှတ်ပုံတင်ပြီး ဆုငွေများ ရယူပါ။' },
      { message: 'Bonus 100% — ဒေါင်းငွေ တိုင်း Bonus 100% ရမည်!' },
      { message: '24/7 ဝန်ဆောင်မှုအဖွဲ့သည် သင့်ကို အချိန်မရွေး ကူညီရန် အသင့်ရှိပါသည်!' },
    ];

    wrap.innerHTML = items.map(i => `
      <div class="cs-marquee-item">
        <div class="cs-marquee-txt">📣 ${i.message}</div>
      </div>`).join('');
  } catch(e) {
    wrap.innerHTML = '<div class="cs-empty"><div class="cs-empty-txt">မရနိုင်ပါ</div></div>';
  }
}

// ── CS Contacts dynamic load ────────────────────────────────
const _CS_LOGO = {
  viber:    'https://ik.imagekit.io/tdpebgueq/icons/viber_logo_wG8S5sFl5P.png',
  telegram: 'https://ik.imagekit.io/tdpebgueq/icons/telegram_logo_QeWRW9-okP.png'
};

function _csSvgIcon(platform, size) {
  const url = (_CS_LOGO[platform] || _CS_LOGO.viber) + '?tr=w-' + (size*2) + ',h-' + (size*2) + ',f-auto&v=2';
  const radius = platform === 'viber' ? 'border-radius:50%;' : '';
  return '<img src="' + url + '" width="' + size + '" height="' + size + '" style="' + radius + 'flex-shrink:0;display:block;object-fit:cover" loading="lazy" onerror="this.style.opacity=0">';
}

async function csLoadContacts() {
  if (!window.DB) return;
  try {
    const { data } = await window.DB
      .from('cs_contacts')
      .select('*')
      .eq('is_active', true)
      .order('sort_order', { ascending: true });
    const viber    = (data||[]).filter(c => c.platform === 'viber');
    const telegram = (data||[]).filter(c => c.platform === 'telegram');
    _csRenderContacts('viber',    viber);
    _csRenderContacts('telegram', telegram);
  } catch(e) {
    console.error('csLoadContacts:', e);
  }
}

function _csRenderContacts(platform, contacts) {
  const container = document.getElementById('csCont-' + platform);
  if (!container) return;
  if (!contacts.length) {
    container.innerHTML = '<div class="cs-empty"><div class="cs-empty-txt">Contact မရှိသေးပါ</div></div>';
    return;
  }
  const isTg = platform === 'telegram';
  container.innerHTML = contacts.map((c, i) => {
    const lid = `${platform}Link${i}`;
    return `<div class="cs-contact-card">
      <div class="cs-cc-logo">${_csSvgIcon(platform, 54)}</div>
      <div class="cs-cc-info">
        <div class="cs-cc-name">${c.name}</div>
        <div class="cs-cc-link-row">
          <span class="cs-cc-link" id="${lid}">${c.display_label}</span>
          <button class="cs-cc-copy" onclick="csCopy('${lid}')" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
        <div class="cs-cc-hours">အွန်လိုင်းအချိန်: ${c.hours||'00:00 - 23:59'}</div>
      </div>
      <a href="${c.contact_url}" ${isTg ? 'target="_blank" rel="noopener"' : ''} class="cs-go-btn">အခုပဲ<br>သွားပါ</a>
    </div>`;
  }).join('');
}

// ── Init (called when page shows) ─────────────────────────
function initCsPage() {
  // Load CS contacts from DB
  csLoadContacts();
  // Pre-load notification badges
  if (window.DB && window.currentUserId) {
    window.DB.from('notifications')
      .select('id', { count: 'exact', head: true })
      .eq('user_id', window.currentUserId)
      .then(({ count }) => {
        if (count > 0) {
          const b = document.getElementById('csBadgeNoti');
          if (b) { b.textContent = count; b.classList.remove('hidden'); }
        }
      });
    window.DB.from('notifications')
      .select('id', { count: 'exact', head: true })
      .eq('type', 'announcement')
      .then(({ count }) => {
        if (count > 0) {
          const b = document.getElementById('csBadgeAnn');
          if (b) { b.textContent = count; b.classList.remove('hidden'); }
        }
      });
  }
}

// Auto-init when CS tab is opened via showPage
const _origShowPage = window.showPage;
if (typeof _origShowPage === 'function') {
  window.showPage = function(nav) {
    _origShowPage(nav);
    if (nav === 'cs') initCsPage();
  };
}
</script>
